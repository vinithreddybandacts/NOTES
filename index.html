<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Notes • File Browser</title>
		<style>
			:root {
				--surface: rgba(15, 18, 25, 0.85);
				--surface-strong: rgba(18, 23, 35, 0.95);
				--accent: #4d9bf0;
				--accent-2: #62d8b6;
				--text: #e9eefc;
				--muted: rgba(233, 238, 252, 0.65);
				--shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
				--radius: 18px;
				--radius-sm: 12px;
				--font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				--animation: 220ms cubic-bezier(0.22, 1, 0.36, 1);
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				height: 100%;
			}

			body {
				margin: 0;
				font-family: var(--font);
				color: var(--text);
				background: radial-gradient(circle at 15% 25%, rgba(77, 155, 240, 0.26), transparent 60%),
					radial-gradient(circle at 75% 40%, rgba(98, 216, 182, 0.22), transparent 55%),
					radial-gradient(circle at 30% 85%, rgba(248, 203, 76, 0.16), transparent 65%),
					radial-gradient(circle at 70% 75%, rgba(232, 97, 146, 0.14), transparent 60%),
					#070912;
				overflow: hidden;
			}

			#app {
				height: 100%;
				display: flex;
				flex-direction: column;
			}

			.topbar {
				padding: 18px 20px 14px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 12px;
			}

			.topbar h1 {
				margin: 0;
				font-size: 1.1rem;
				letter-spacing: 0.05em;
				font-weight: 600;
			}

			.toolbar {
				display: flex;
				gap: 10px;
				align-items: center;
			}

			.toolbar button {
				border: 0;
				padding: 10px 12px;
				border-radius: 999px;
				background: rgba(255, 255, 255, 0.075);
				color: var(--text);
				display: inline-flex;
				align-items: center;
				gap: 8px;
				font-size: 0.9rem;
				cursor: pointer;
				transition: transform var(--animation), background var(--animation);
			}

			.toolbar button:hover {
				transform: translateY(-1px);
				background: rgba(255, 255, 255, 0.12);
			}

			.toolbar button:active {
				transform: translateY(0);
			}

			.toolbar input {
				border: 0;
				background: rgba(255, 255, 255, 0.08);
				padding: 10px 12px;
				border-radius: 999px;
				color: var(--text);
				width: 220px;
				letter-spacing: 0.01em;
			}

			.toolbar input::placeholder {
				color: var(--muted);
			}

			.content {
				flex: 1;
				padding: 0 20px 20px;
				overflow: auto;
				scrollbar-width: thin;
				scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
			}

			.content::-webkit-scrollbar {
				width: 10px;
			}

			.content::-webkit-scrollbar-thumb {
				background: rgba(255, 255, 255, 0.18);
				border-radius: 999px;
			}

			.breadcrumb {
				display: flex;
				gap: 10px;
				padding: 10px 14px;
				margin: 0 18px 10px;
				border-radius: 999px;
				background: rgba(12, 15, 22, 0.75);
				backdrop-filter: blur(18px);
				align-items: center;
				flex-wrap: wrap;
			}

			.breadcrumb span {
				font-size: 0.85rem;
				color: var(--muted);
			}

			.breadcrumb button {
				border: 0;
				background: none;
				color: var(--text);
				font-size: 0.85rem;
				cursor: pointer;
				padding: 4px;
				border-radius: 999px;
				transition: background var(--animation);
			}

			.breadcrumb button:hover {
				background: rgba(255, 255, 255, 0.08);
			}

			.items {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
				gap: 12px;
			}

			.items.list {
				display: flex;
				flex-direction: column;
			}

			.item {
				display: flex;
				flex-direction: column;
				padding: 18px 14px 16px;
				border-radius: var(--radius);
				background: rgba(255, 255, 255, 0.06);
				box-shadow: var(--shadow);
				backdrop-filter: blur(16px);
				cursor: pointer;
				transition: transform var(--animation), background var(--animation);
				position: relative;
				overflow: hidden;
				min-height: 135px;
			}

			.items.list .item {
				flex-direction: row;
				align-items: center;
				padding: 12px 14px;
				min-height: 60px;
			}

			.item:hover {
				transform: translateY(-3px);
				background: rgba(255, 255, 255, 0.11);
			}

			.item svg {
				width: 38px;
				height: 38px;
				flex-shrink: 0;
			}

			.items.list .item svg {
				width: 30px;
				height: 30px;
			}

			.item-body {
				margin-top: 14px;
				display: flex;
				flex-direction: column;
				gap: 8px;
				flex: 1;
			}

			.items.list .item-body {
				margin-top: 0;
				margin-left: 14px;
			}

			.item-title {
				font-weight: 600;
				font-size: 0.95rem;
				line-height: 1.2;
				word-break: break-word;
			}

			.item-meta {
				font-size: 0.77rem;
				color: var(--muted);
				line-height: 1.25;
			}

			.item-badge {
				position: absolute;
				top: 12px;
				right: 12px;
				padding: 2px 8px;
				border-radius: 999px;
				background: rgba(255, 255, 255, 0.1);
				font-size: 0.7rem;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.07em;
			}

			.empty {
				margin: 60px auto;
				padding: 24px;
				max-width: 520px;
				text-align: center;
				border-radius: var(--radius);
				background: rgba(255, 255, 255, 0.07);
				box-shadow: var(--shadow);
			}

			.empty h2 {
				margin: 0 0 10px;
				font-size: 1.2rem;
			}

			.empty p {
				margin: 0;
				color: var(--muted);
			}

			@media (max-width: 620px) {
				.toolbar input {
					width: 150px;
				}

				.items {
					grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
				}
			}
		</style>
	</head>
	<body>
		<div id="app">
			<header class="topbar">
				<h1>Notes • File Browser</h1>
				<div class="toolbar">
					<input id="filter" placeholder="Search files…" autocomplete="off" />
					<button id="toggleView" title="Toggle list/grid view">
						<span id="viewLabel">Grid</span>
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<path d="M3 3h7v7H3z" />
							<path d="M14 3h7v7h-7z" />
							<path d="M3 14h7v7H3z" />
							<path d="M14 14h7v7h-7z" />
						</svg>
					</button>
				</div>
			</header>

			<nav class="breadcrumb" aria-label="Breadcrumb" id="breadcrumb"></nav>

			<main class="content" id="content">
				<div class="items" id="items"></div>
			</main>
		</div>

		<script>
			const icons = {
				folder: `
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h6l2 2h8a2 2 0 0 1 2 2z" />
					</svg>
				`,
				file: `
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
						<path d="M14 2v6h6" />
					</svg>
				`,
				json: `
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M10 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5" />
						<path d="M14 3l7 7" />
						<path d="M7 12h3" />
						<path d="M7 16h3" />
						<path d="M12 14h4" />
						<path d="M12 18h4" />
					</svg>
				`,
			};

			const state = {
				view: 'grid',
				path: '.',
				filter: '',
				manifest: [],
				structure: new Map(),
			};

			const itemsEl = document.getElementById('items');
			const breadcrumbEl = document.getElementById('breadcrumb');
			const toggleBtn = document.getElementById('toggleView');
			const viewLabel = document.getElementById('viewLabel');
			const filterInput = document.getElementById('filter');

			const humanSize = (bytes) => {
				if (bytes === 0) return '0 B';
				const units = ['B', 'KB', 'MB', 'GB', 'TB'];
				let i = 0;
				let v = bytes;
				while (v >= 1024 && i < units.length - 1) {
					v /= 1024;
					i += 1;
				}
				return `${v.toFixed(1)} ${units[i]}`;
			};

			const formatDate = (epoch) => {
				if (!epoch) return '';
				const d = new Date(epoch);
				return d.toLocaleString(undefined, {
					month: 'short',
					day: 'numeric',
					hour: '2-digit',
					minute: '2-digit',
				});
			};

			const normalizePath = (path) => path.replace(/\\/g, '/').replace(/\/\/+/, '/');

			const buildStructure = () => {
				state.structure.clear();
				state.manifest.forEach((entry) => {
					const normalized = normalizePath(entry.path);
					const folder = normalized.includes('/') ? normalized.replace(/\/[^/]*$/, '') : '.';
					const key = normalizePath(folder);
					if (!state.structure.has(key)) state.structure.set(key, []);
					state.structure.get(key).push(entry);
				});
			};

			const updateBreadcrumb = () => {
				const active = normalizePath(state.path) || '.';
				const parts = active === '.' ? ['.'] : active.split('/');
				breadcrumbEl.innerHTML = '';
				const buildPath = (idx) => (idx === 0 ? '.' : parts.slice(0, idx + 1).join('/'));
				parts.forEach((part, idx) => {
					const isLast = idx === parts.length - 1;
					if (idx > 0) {
						const sep = document.createElement('span');
						sep.textContent = '›';
						breadcrumbEl.appendChild(sep);
					}
					if (isLast) {
						const span = document.createElement('span');
						span.textContent = part || '.';
						breadcrumbEl.appendChild(span);
					} else {
						const btn = document.createElement('button');
						btn.textContent = part || '.';
						btn.addEventListener('click', () => {
							state.path = buildPath(idx);
							render();
						});
						breadcrumbEl.appendChild(btn);
					}
				});
			};

			const getChildren = () => {
				const active = normalizePath(state.path) || '.';
				const list = state.structure.get(active) || [];
				const filter = state.filter.trim().toLowerCase();
				if (!filter) return list;
				return list.filter((item) => item.name.toLowerCase().includes(filter));
			};

			const render = () => {
				updateBreadcrumb();
				itemsEl.classList.toggle('list', state.view === 'list');
				viewLabel.textContent = state.view === 'grid' ? 'Grid' : 'List';

				const children = getChildren();
				itemsEl.innerHTML = '';

				if (!children.length) {
					itemsEl.innerHTML = `
						<div class="empty">
							<h2>No items found.</h2>
							<p>Try a different folder or clear the search filter.</p>
						</div>
					`;
					return;
				}

				children.sort((a, b) => {
					if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
					return a.name.localeCompare(b.name, undefined, { sensitivity: 'base' });
				});

				for (const item of children) {
					const el = document.createElement('button');
					el.type = 'button';
					el.className = 'item';
					el.innerHTML = `
						<div class="icon">${item.type === 'dir' ? icons.folder : icons.file}</div>
						<div class="item-body">
							<div class="item-title">${item.name}</div>
							<div class="item-meta">${item.type === 'dir' ? 'Folder' : item.extension.toUpperCase() + ' • ' + humanSize(item.size)} · ${formatDate(item.mtime)}</div>
						</div>
						<div class="item-badge">${item.type === 'dir' ? 'DIR' : item.extension.toUpperCase() || 'FILE'}</div>
					`;

					el.addEventListener('click', () => {
						if (item.type === 'dir') {
							state.path = normalizePath((state.path === '.' ? '' : state.path) + '/' + item.name);
							render();
						} else {
							const url = encodeURI(normalizePath(item.path));
							window.open(url, '_blank');
						}
					});

					itemsEl.appendChild(el);
				}
			};

			const loadManifest = async () => {
				try {
					const response = await fetch('manifest.json', { cache: 'no-cache' });
					if (!response.ok) throw new Error('Manifest load failed');
					const data = await response.json();
					state.manifest = data;
					buildStructure();
					render();
				} catch (error) {
					itemsEl.innerHTML = `
						<div class="empty">
							<h2>Unable to load file list.</h2>
							<p>Ensure <code>manifest.json</code> exists in the same folder and that you're serving the directory over HTTP (e.g. <code>python -m http.server</code>).</p>
						</div>
					`;
					console.error(error);
				}
			};

			toggleBtn.addEventListener('click', () => {
				state.view = state.view === 'grid' ? 'list' : 'grid';
				render();
			});

			filterInput.addEventListener('input', (ev) => {
				state.filter = ev.target.value;
				render();
			});

			loadManifest();
		</script>
	</body>
</html>
