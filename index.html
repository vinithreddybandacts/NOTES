<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="A lightweight, responsive repository reader for Markdown notes." />
		<title>Notes Browser</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>

		<style>
			:root {
				--bg: #0b0d11;
				--panel: rgba(255, 255, 255, 0.08);
				--panel-strong: rgba(255, 255, 255, 0.12);
				--border: rgba(255, 255, 255, 0.12);
				--text: rgba(255, 255, 255, 0.92);
				--muted: rgba(255, 255, 255, 0.65);
				--accent: #5bc0de;
				--radius: 18px;
				--shadow: 0 18px 45px rgba(0, 0, 0, 0.4);
				--blur: 18px;
				--transition: 180ms ease;
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				margin: 0;
				height: 100%;
				font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
					sans-serif;
				background: radial-gradient(circle at 20% 10%, rgba(93, 156, 255, 0.2), transparent 50%),
					radial-gradient(circle at 80% 40%, rgba(255, 118, 197, 0.18), transparent 55%),
					var(--bg);
				color: var(--text);
				overflow: hidden;
			}

			a {
				color: var(--accent);
				text-decoration: none;
			}

			a:hover {
				text-decoration: underline;
			}

			.layout {
				height: 100%;
				display: grid;
				grid-template-rows: auto 1fr;
				grid-template-columns: 1fr;
			}

			header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 16px 20px;
				gap: 12px;
				-webkit-backdrop-filter: blur(var(--blur));
				backdrop-filter: blur(var(--blur));
				background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.12));
				border-bottom: 1px solid var(--border);
			}

			header .brand {
				display: flex;
				align-items: center;
				gap: 12px;
				font-weight: 700;
				letter-spacing: 0.02em;
				font-size: 16px;
			}

			header .brand .badge {
				background: rgba(255, 255, 255, 0.12);
				padding: 4px 10px;
				border-radius: 999px;
				font-size: 12px;
			}

			header input {
				flex: 1;
				min-width: 160px;
				max-width: 400px;
				background: rgba(255, 255, 255, 0.1);
				border: 1px solid rgba(255, 255, 255, 0.14);
				border-radius: 999px;
				padding: 9px 14px;
				color: var(--text);
				outline: none;
				transition: border var(--transition), background var(--transition);
			}

			header input:focus {
				border-color: rgba(91, 192, 222, 0.7);
				background: rgba(255, 255, 255, 0.12);
			}

			main {
				display: grid;
				grid-template-columns: minmax(250px, 340px) 1fr;
				height: 100%;
				gap: 14px;
				padding: 18px;
			}

			.sidebar {
				position: relative;
				border-radius: var(--radius);
				overflow: hidden;
				background: var(--panel);
				box-shadow: var(--shadow);
				border: 1px solid var(--border);
				display: flex;
				flex-direction: column;
			}

			.sidebar header {
				padding: 14px 18px;
				font-weight: 600;
				font-size: 13px;
				letter-spacing: 0.05em;
				text-transform: uppercase;
				color: var(--muted);
			}

			.tree {
				overflow: auto;
				padding: 12px 12px 20px;
				flex: 1;
			}

			.tree::-webkit-scrollbar {
				width: 8px;
			}
			.tree::-webkit-scrollbar-thumb {
				background: rgba(255, 255, 255, 0.12);
				border-radius: 999px;
			}

			.tree-item {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 8px 10px;
				border-radius: 14px;
				cursor: pointer;
				font-size: 14px;
				transition: background var(--transition);
			}

			.tree-item:hover {
				background: rgba(255, 255, 255, 0.08);
			}

			.tree-item.active {
				background: rgba(91, 192, 222, 0.2);
			}

			.tree-item .icon {
				width: 18px;
				height: 18px;
				display: grid;
				place-items: center;
				color: rgba(255, 255, 255, 0.7);
			}

			.content {
				position: relative;
				border-radius: var(--radius);
				overflow: hidden;
				background: rgba(10, 12, 18, 0.78);
				box-shadow: var(--shadow);
				border: 1px solid var(--border);
				display: flex;
				flex-direction: column;
			}

			.content-header {
				padding: 16px 20px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 14px;
				border-bottom: 1px solid rgba(255, 255, 255, 0.08);
				-webkit-backdrop-filter: blur(var(--blur));
				backdrop-filter: blur(var(--blur));
			}

			.content-header h1 {
				font-size: 18px;
				margin: 0;
				font-weight: 600;
				max-width: 70%;
				text-overflow: ellipsis;
				white-space: nowrap;
				overflow: hidden;
			}

			.content-header .meta {
				display: flex;
				align-items: center;
				gap: 10px;
				font-size: 12px;
				color: var(--muted);
			}

			.content-body {
				overflow: auto;
				padding: 22px 26px;
				flex: 1;
			}

			.content-body > *:first-child {
				scroll-margin-top: 90px;
			}

			.content-body img {
				max-width: 100%;
				border-radius: 12px;
			}

			.content-body pre {
				background: rgba(0, 0, 0, 0.25);
				padding: 14px;
				border-radius: 14px;
				overflow: auto;
			}

			.content-body code {
				font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
					"Courier New", monospace;
			}

			.toast {
				position: fixed;
				left: 50%;
				bottom: 22px;
				transform: translateX(-50%);
				background: rgba(0, 0, 0, 0.65);
				color: rgba(255, 255, 255, 0.92);
				padding: 12px 18px;
				border-radius: 999px;
				border: 1px solid rgba(255, 255, 255, 0.14);
				-webkit-backdrop-filter: blur(12px);
				backdrop-filter: blur(12px);
				font-size: 13px;
				opacity: 0;
				pointer-events: none;
				transition: opacity 200ms ease;
			}

			.toast.show {
				opacity: 1;
			}

			@media (max-width: 900px) {
				main {
					grid-template-columns: 1fr;
					grid-template-rows: auto 1fr;
				}
				.sidebar {
					height: 360px;
				}
				.content {
					height: calc(100% - 380px);
				}
			}

			@media (max-width: 520px) {
				header {
					flex-wrap: wrap;
					justify-content: center;
					gap: 10px;
				}
				header input {
					width: 100%;
					max-width: none;
				}
				main {
					padding: 12px;
				}
			}
		</style>
	</head>
	<body>
		<div class="layout">
			<header>
				<div class="brand">
					<span>Notes Browser</span>
					<span class="badge">Live</span>
				</div>
				<input id="search" type="search" placeholder="Search notes & folders…" autocomplete="off" />
			</header>
			<main>
				<aside class="sidebar" aria-label="File tree">
					<header>Files</header>
					<div class="tree" id="tree"></div>
				</aside>
				<section class="content" aria-label="Markdown viewer">
					<header class="content-header">
						<h1 id="title">Select a file to view</h1>
						<div class="meta" id="meta"></div>
					</header>
					<article class="content-body" id="content">
						<p class="intro">
							This page reads markdown files from the repository live via GitHub. Use the file
							browser to the left (or above on small screens) to pick a note. Everything is loaded
							on demand, and new files/folders appear after you refresh.
						</p>
					</article>
				</section>
			</main>
			<div class="toast" id="toast">Loading…</div>
		</div>

		<script>
			const owner = "vinithreddybandacts";
			const repo = "NOTES";
			const branch = "main";
			const apiBase = `https://api.github.com/repos/${owner}/${repo}`;
			const rawBase = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}`;

			const treeEl = document.getElementById("tree");
			const titleEl = document.getElementById("title");
			const metaEl = document.getElementById("meta");
			const contentEl = document.getElementById("content");
			const searchEl = document.getElementById("search");
			const toastEl = document.getElementById("toast");

			let fileTree = [];
			let activePath = null;
			let lastFetchAbort = null;

			function showToast(message) {
				toastEl.textContent = message;
				toastEl.classList.add("show");
				clearTimeout(toastEl._timeout);
				toastEl._timeout = setTimeout(() => toastEl.classList.remove("show"), 2200);
			}

			function formatSize(bytes) {
				if (bytes === 0) return "0 B";
				const units = ["B", "KB", "MB", "GB"];
				const i = Math.floor(Math.log(bytes) / Math.log(1024));
				return `${(bytes / 1024 ** i).toFixed(1)} ${units[i]}`;
			}

			async function fetchRepoTree() {
				showToast("Loading repository structure…");
				const url = `${apiBase}/git/trees/${branch}?recursive=1`;
				const resp = await fetch(url);
				if (!resp.ok) {
					throw new Error(`Unable to load repository tree: ${resp.status} ${resp.statusText}`);
				}
				const data = await resp.json();
				return data.tree || [];
			}

			function buildTree(tree) {
				const folders = { "": { name: "", children: {}, files: [] } };

				tree
					.filter((item) => item.type === "blob")
					.forEach((file) => {
						const path = file.path;
						const parts = path.split("/");
						const fileName = parts.pop();
						const folderPath = parts.join("/");
						const folder = folders[folderPath] || (folders[folderPath] = { name: folderPath, children: {}, files: [] });
						folder.files.push({ name: fileName, path, size: file.size || 0 });
						for (let i = 0; i < parts.length; i++) {
							const subpath = parts.slice(0, i + 1).join("/");
							const parent = i === 0 ? folders[""] : folders[parts.slice(0, i).join("/")];
							if (parent && !parent.children[subpath]) {
								parent.children[subpath] = folders[subpath] || { name: subpath, children: {}, files: [] };
							}
						}
					});

				return folders;
			}

			function renderFileTree(folders, filter = "") {
				const root = folders[""];
				const query = filter.trim().toLowerCase();
				const elements = [];

				function walk(folder, depth) {
					const children = Object.values(folder.children).sort((a, b) => a.name.localeCompare(b.name));
					const files = folder.files.slice().sort((a, b) => a.name.localeCompare(b.name));

					const folderLabel = folder.name || "root";
					if (folder.name) {
						const folderName = folder.name.split("/").pop();
						if (!query || folderName.toLowerCase().includes(query)) {
							elements.push({ type: "folder", depth, name: folderName, path: folder.name });
						}
					}

					files.forEach((file) => {
						const match = !query || file.name.toLowerCase().includes(query) || file.path.toLowerCase().includes(query);
						if (!match) return;
						elements.push({ type: "file", depth: depth + 1, name: file.name, path: file.path, size: file.size });
					});

					children.forEach((child) => walk(child, depth + 1));
				}

				walk(root, 0);
				treeEl.innerHTML = "";
				elements.forEach((item) => {
					const el = document.createElement("div");
					el.className = "tree-item";
					if (item.type === "file") el.dataset.path = item.path;
					el.style.paddingLeft = `${12 + item.depth * 14}px`;
					const icon = document.createElement("span");
					icon.className = "icon";
					icon.innerHTML = item.type === "file" ? "📄" : "📁";
					const label = document.createElement("span");
					label.textContent = item.name;
					el.appendChild(icon);
					el.appendChild(label);
					if (item.type === "file") {
						const meta = document.createElement("span");
						meta.style.marginLeft = "auto";
						meta.style.color = "rgba(255,255,255,0.44)";
						meta.style.fontSize = "12px";
						meta.textContent = formatSize(item.size);
						el.appendChild(meta);
					}
					el.addEventListener("click", () => {
						if (item.type === "file") {
							setActivePath(item.path);
						}
					});
					treeEl.appendChild(el);
				});
			}

			function setActivePath(path) {
				activePath = path;
				document.querySelectorAll(".tree-item").forEach((el) => {
					el.classList.toggle("active", el.dataset.path === path);
				});
				loadFile(path);
			}

			async function loadFile(path) {
				if (lastFetchAbort) {
					lastFetchAbort.abort();
				}
				const controller = new AbortController();
				lastFetchAbort = controller;

				const url = `${rawBase}/${encodeURI(path)}`;
				try {
					showToast("Loading file…");
					titleEl.textContent = path;
					metaEl.textContent = "fetching …";

					const res = await fetch(url, { signal: controller.signal });
					if (!res.ok) {
						throw new Error(`Failed to load file: ${res.status}`);
					}
					const md = await res.text();
					const rendered = window.marked.parse(md);
					contentEl.innerHTML = rendered;
					const size = new Blob([md]).size;
					metaEl.textContent = `${formatSize(size)} • ${new Date().toLocaleDateString()}`;
				} catch (err) {
					if (err.name === "AbortError") return;
					contentEl.innerHTML = `<p style="color: rgba(255,255,255,0.72)">Unable to load file. ${err.message}</p>`;
					metaEl.textContent = "error";
					showToast("Failed to load file");
				}
			}

			async function init() {
				try {
					const tree = await fetchRepoTree();
					const folders = buildTree(tree);
					fileTree = folders;
					renderFileTree(folders);
					showToast("Repository loaded. Select a file.");
				} catch (err) {
					contentEl.innerHTML = `<p style="color: rgba(255,255,255,0.72)">Unable to read repository structure. ${err.message}</p>`;
					showToast("Could not load repository");
				}
			}

			searchEl.addEventListener("input", () => {
				renderFileTree(fileTree, searchEl.value);
			});

			window.addEventListener("keydown", (event) => {
				if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "f") {
					event.preventDefault();
					searchEl.focus();
				}
			});

			window.addEventListener("load", () => {
				init();
			});
		</script>

		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" crossorigin="anonymous"></script>
	</body>
</html>
